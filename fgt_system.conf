#config-version=FGT60F-7.2-FW-build0000-000000:opmode=0:vdom=0:user=admin
#conf_file_ver=0

config system global
    set hostname "FGT-BOOTSTRAP"
    set timezone 26
end

config system dns
    set primary 10.0.1.5
    set secondary 8.8.8.8
end

config system virtual-switch
    edit "internal"
        config port
            delete "internal5"
            delete "internal4"
            delete "internal3"
        end
    next
end

config system interface
    edit "internal5"
        set mode static
        set ip 10.20.30.1 255.255.255.0
        set allowaccess ping https ssh
        set alias "MGMT"
    next
end

config system interface
    edit "internal3"
        set mode static
        set ip 10.20.106.5 255.255.255.0
        set allowaccess ping https ssh
        set alias "OT-LAN"
    next
end

config system dhcp server
    edit 1
        set interface "internal5"
        set status enable
        set netmask 255.255.255.0
        set default-gateway 10.20.30.1
        set dns-server1 10.0.1.5
        config ip-range
            edit 1
                set start-ip 10.20.30.41
                set end-ip 10.20.30.51
            next
        end
    next
end

config log syslogd setting
    set status enable
    set server "grafana.cs.lab"
    set source-ip 10.20.30.1
end

config system snmp community
    edit 1
        set name "SecSi"
        config hosts
            edit 1
                set ip 10.0.1.19 255.255.255.255
            next
        end
    next
end

config system admin
    edit "admin"
        set trusthost1 109.247.29.111 255.255.255.255
        set trusthost2 85.252.22.53 255.255.255.255
        set trusthost3 10.20.30.0 255.255.255.0
    next
end

config system auto-install
    set auto-install-config disable
    set auto-install-image disable
end
