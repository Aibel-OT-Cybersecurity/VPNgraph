config system global
    set hostname "BOOTSTRAP_usb"
    set timezone 26  # Set to your local timezone
end

# Ensure DNS is working for your FQDNs
config system dns
    set primary 10.0.1.5
    set secondary 8.8.8.8
end

# Free up internal5 from the hardware switch
config system virtual-switch
    edit "internal"
        config port
            delete "internal3"
            delete "internal4"
            delete "internal5"
        end
    next
end

# Configure the interface 3
config system interface
    edit "internal3"
        set mode static
        set ip 10.20.106.5 255.255.255.0
        set allowaccess ping https ssh
    next
end

# Configure the interface
config system interface
    edit "internal5"
        set mode static
        set ip 10.20.30.1 255.255.255.0
        set allowaccess ping https ssh
    next
end

# DHCP Server for your local lab
config system dhcp server
    edit 1
        set interface "internal5"
        set status enable
        set netmask 255.255.255.0
        config ip-range
            edit 1
                set start-ip 10.20.30.41
                set end-ip 10.20.30.51
            next
        end
    next
end

# Logging with the Source-IP fix
config log syslogd setting
    set status enable
    set server "grafana.cs.lab"
    set source-ip 10.20.30.1
end

# Management Security
config system admin
    edit "admin"
        set trusthost1 109.247.29.111 255.255.255.255
        set trusthost2 85.252.22.53 255.255.255.255
    next
end

# Security: Disable USB auto-install so it doesn't run again
config system auto-install
    set auto-install-config disable
end