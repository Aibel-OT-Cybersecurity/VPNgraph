## Remote end - Address objects for the VPN subnets

config firewall address
    edit "ABB_LAN"
        set subnet 10.20.106.0 255.255.255.0  # Your internal subnet
    next
    edit "Asker_Subnet"
        set subnet 10.0.1.0 255.255.255.0     # The datacenter site subnet
    next
end

## Firewall policies for outgoing the remote end (Fortigate 60F)
config firewall policy
    edit 0
        set name "Outbound_to_VPN-ASKER"
        # Your physical LAN port
        set srcintf "internal3" 
        # Use your Phase 1 name               
        set dstintf "P1_MNTEST"         
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        # NAT must be OFF for site-to-site VPNs
        set nat disable                       
    next
end

## Firewall policies for incoming traffic on the remote end (Fortigate 60F)
config firewall policy
    edit 0
        set name "Inbound_from_VPN-ASKER"
        set srcintf "P1_MNTEST"         
        set dstintf "internal3"                
        #tighten these next two to specific subnets if possible
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set nat disable                       
    next
end

## Firewall policies for the central end (Fortigate 61F)
config firewall policy
    edit 0
        set name "Outbound_to_VPN-MNTEST"
        # Your physical LAN port
        set srcintf "Jump" 
        # Use your Phase 1 name               
        set dstintf "P1_MNTEST"         
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        # NAT must be OFF for site-to-site VPNs
        set nat disable                       
    next
end

## Firewall policies for incoming traffic on the central end (Fortigate 61F)

config firewall policy
    edit 0
        set name "Inbound_from_VPN-MNTEST"
        set srcintf "P1_MNTEST"         
        set dstintf "jslab-config"                
        #tighten these next two to specific subnets if possible
        set srcaddr "all"
        set dstaddr "all"
