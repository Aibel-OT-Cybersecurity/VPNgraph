## DDNS setup on remote Fortigate

config system ddns
    edit 1
        set ddns-server FortiGuard
        set ddns-domain "LAE-MNTEST.fortiddns.com"
        set monitor-interface "wan1"
        # If the 5G router does not pass the public IP directly (Double NAT),
        # uncomment the next line:
        # set use-public-ip enable 
    next
end

## Setup the VIrtual IP for the ABB-SAS on the remote Fortigate
config firewall vip
    edit "ABB_SAS_VIP_Range"
        # The IPs the remote side sees
        set extip 10.20.106.3-10.20.106.5     
        # The actual internal IPs 
        set mappedip 192.168.106.3-192.168.106.5 
        # Allows traffic from any interface (including VPN)
        set extintf "any"
        # Optional: gives the object a color in the GUI                       
        set color 6                             
    next
end

## csteam-kit-fw # show vpn ipsec phase1-interface Ask-Leam_VPN

    config vpn ipsec phase1-interface
        edit "P1_MNTEST"
            set type ddns
            set interface "wan1"
            set ike-version 2
            set peertype any
            set net-device disable
            set proposal aes256-sha256
            set localid "csteam.fortiddns.com"
            set remotegw-ddns "LAE-MNTEST.fortiddns.com" 
            set psksecret "l25fM6jWeACJczCJhetQSdO-3zlIFCSA"
        next
    end

