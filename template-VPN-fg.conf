## csteam-new-fw# show vpn ipsec phase2-interface Ask-Leam_VPN
    config vpn ipsec phase2-interface
        edit "P2_MNTEST"
            set phase1name "P1_MNTEST"
            set proposal aes256-sha256
            set auto-negotiate enable

            # Use 0.0.0.0/0 to allow route-based control
            set src-subnet 0.0.0.0 0.0.0.0
            set dst-subnet 0.0.0.0 0.0.0.0
        next
    end

