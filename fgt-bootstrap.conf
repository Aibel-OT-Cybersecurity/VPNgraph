# =============================================================================
# FortiGate USB Bootstrap Configuration (Day-Zero)
# =============================================================================
# Purpose:  Bring a factory-reset FortiGate online so it is reachable via
#           HTTPS (web GUI) and SSH for further configuration.
#
# Usage:    Save this file as  fgt_system.conf  on a FAT32-formatted USB drive.
#           Plug the drive into the FortiGate and power it on.  The device will
#           auto-apply the config on first boot.
#
# Customize every value marked with <<CHANGE>> before deploying.
# =============================================================================

# --- 1. Global settings ------------------------------------------------------
config system global
    set hostname "FGT-BOOTSTRAP"                     # <<CHANGE>> friendly name
    set timezone 26                                   # 26 = (GMT+1:00) Amsterdam/Berlin
end

# --- 2. DNS -------------------------------------------------------------------
config system dns
    set primary 10.0.1.5                              # <<CHANGE>> internal DNS
    set secondary 8.8.8.8
end

# --- 3. Free ports from the hardware switch -----------------------------------
#     By default all internal ports belong to a single bridge.  We remove
#     internal3-5 so they can be configured as independent routed interfaces.
config system virtual-switch
    edit "internal"
        config port
            delete "internal5"
            delete "internal4"
            delete "internal3"
        end
    next
end

# --- 4. Management interface --------------------------------------------------
#     This is the interface you will connect your laptop / management network to.
config system interface
    edit "internal5"
        set mode static
        set ip 10.20.30.1 255.255.255.0               # <<CHANGE>> management IP
        set allowaccess ping https ssh
        set alias "MGMT"
    next
end

# --- 5. OT / secondary interface (optional) -----------------------------------
config system interface
    edit "internal3"
        set mode static
        set ip 10.20.106.5 255.255.255.0               # <<CHANGE>>
        set allowaccess ping https ssh
        set alias "OT-LAN"
    next
end

# --- 6. DHCP server on management interface -----------------------------------
#     Lets a laptop plugged into internal5 get an address automatically.
config system dhcp server
    edit 1
        set interface "internal5"
        set status enable
        set netmask 255.255.255.0
        set default-gateway 10.20.30.1                 # <<CHANGE>> match internal5 IP
        set dns-server1 10.0.1.5                       # <<CHANGE>> match DNS above
        config ip-range
            edit 1
                set start-ip 10.20.30.41
                set end-ip 10.20.30.51
            next
        end
    next
end

# --- 7. Syslog forwarding ----------------------------------------------------
config log syslogd setting
    set status enable
    set server "grafana.cs.lab"                        # <<CHANGE>> syslog collector
    set source-ip 10.20.30.1                           # <<CHANGE>> match internal5 IP
end

# --- 8. SNMP ------------------------------------------------------------------
config system snmp community
    edit 1
        set name "SecSi"                               # <<CHANGE>> community string
        config hosts
            edit 1
                set ip 10.0.1.19 255.255.255.255       # <<CHANGE>> SNMP manager
            next
        end
    next
end

# --- 9. Admin trusted hosts ---------------------------------------------------
#     Restrict GUI/SSH access to known public IPs.  Add more trusthostN lines
#     as needed.
config system admin
    edit "admin"
        set trusthost1 109.247.29.111 255.255.255.255  # <<CHANGE>> office IP 1
        set trusthost2 85.252.22.53 255.255.255.255    # <<CHANGE>> office IP 2
        set trusthost3 10.20.30.0 255.255.255.0        # allow local MGMT subnet
    next
end

# --- 10. Disable USB auto-install (security) ----------------------------------
#     Prevents the FortiGate from re-applying a USB config on the next reboot.
config system auto-install
    set auto-install-config disable
    set auto-install-image disable
end
